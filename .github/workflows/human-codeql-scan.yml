name: "Human CodeQL Scan Auditing"

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Target Repository Path (e.g., antiwork/gumroad)"
        required: true
        type: string
      pr_num:
        description: "Target Pull Request Number (e.g., 710)"
        required: true
        type: string
      language:
        description: "Primary Language Footprint (e.g., ruby, python, javascript)"
        required: true
        type: string
        default: "python"
      agent_name:
        description: "AI Coding Agent Identifier"
        required: true
        type: string
        default: "Human_Auditor"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  discover:
    name: Prepare Manual Audit Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.manual_payload.outputs.matrix_data }}
    steps:
      - name: Build Manual Targeting Matrix Payload
        id: manual_payload
        run: |
          SAFE_CAT=$(echo "${{ inputs.repo_name }}" | sed 's/\//_SLASH_/g')--${{ inputs.pr_num }}--${{ inputs.language }}--${{ inputs.agent_name }}
          
          echo "matrix_data<<EOF" >> $GITHUB_OUTPUT
          echo "{\"include\":[
            {
              \"repo_name\":\"${{ inputs.repo_name }}\",
              \"pr_num\":\"${{ inputs.pr_num }}\",
              \"language\":\"${{ inputs.language }}\",
              \"agent_name\":\"${{ inputs.agent_name }}\",
              \"category_name\":\"$SAFE_CAT\"
            }
          ]}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  analyze:
    name: Scan ${{ matrix.repo_name }} (#${{ matrix.pr_num }}) - [${{ matrix.language }}]
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CODEQL_RAM: 12000
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare Workspace and Checkout PR
        id: pr_checkout
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_SCAN_PAT }}
          GIT_LFS_SKIP_SMUDGE: 1
        run: |
          git config --global filter.lfs.smudge "git-lfs smudge --skip -- %f"
          git config --global filter.lfs.process "git-lfs filter-process --skip"
          mkdir -p /tmp/scripts && cp scripts/* /tmp/scripts/ 2>/dev/null || true
          rm -rf ./*
          gh pr checkout ${{ matrix.pr_num }} --repo ${{ matrix.repo_name }}
          mkdir -p scripts && cp /tmp/scripts/* scripts/ 2>/dev/null || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          db-location: ${{ runner.temp }}/codeql_db
          trap-caching: false
          queries: security-extended,security-experimental

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/pr:${{ matrix.category_name }}"
          output: sarif-results
          upload: false 
          wait-for-processing: false 

      - name: Create Summary
        if: always()
        run: |
          if [ -d "sarif-results" ]; then
            cp sarif-results/*.sarif ./results.sarif 2>/dev/null || true
            SAFE_REPO=$(echo "${{ matrix.repo_name }}" | sed 's/\//_SLASH_/g')
            cp sarif-results/*.sarif "./${SAFE_REPO}--${{ matrix.pr_num }}--${{ matrix.language }}--${{ matrix.agent_name }}.sarif" 2>/dev/null || true
            echo "success" > "./${SAFE_REPO}--${{ matrix.pr_num }}.success"
            python scripts/parse-results.py || true
          else
            SAFE_REPO=$(echo "${{ matrix.repo_name }}" | sed 's/\//_SLASH_/g')
            echo "failed" > "./${SAFE_REPO}--${{ matrix.pr_num }}.failed"
          fi

      - name: Save Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-${{ matrix.category_name }}
          path: |
            *.sarif
            *.success
            *.failed

  report:
    name: Consolidate Final Report
    needs: analyze
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Available Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: sarif-*
          path: all-results
          merge-multiple: true

      - name: Generate Consolidated Summary Table
        env:
          MATRIX_JSON: ${{ needs.discover.outputs.matrix }}
        run: |
          python scripts/consolidate-report.py
